<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <div class="container">
    <div class="left-container">
      <img src="./images/image-product-desktop.jpg" alt="perfume image" class="image-desktop">
      <img src="./images/image-product-mobile.jpg" alt="perfume image mobile" class="image-mobile">
    </div>
    <div class="right-container">
        <p class="perfume">PERFUME</p>
        <h1 class="title">Gabrielle Essence Eau De Parfum</h1>
        <p class="paragraph">
          A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL
        </p>
        <section class="price-container">
          <p class="price">$149.99</p>
          <p class="price-cut">$169.99</p>
        </section>
        <button class="buy">
          <img src="./images/icon-cart.svg" alt="Cart">
          <span>Add to Cart</span>
        </button>         
    </div>
  </div>

  <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>. -->
  </footer>
</body>
</html>
